server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Конфиг запуска для Media Station X (MSX).
    # Адрес сервера в start.json подставляется автоматически из самого
    # запроса: {PREFIX} → http(s)://, {domain} → host:port, по которому
    # открыли файл. Любой, кто развернёт эту сборку, получает рабочий
    # MSX без ручного редактирования — TV просто указывает на
    #   http://<сервер>/msx/start.json
    location = /msx/start.json {
        sub_filter_once  off;
        sub_filter_types application/json;
        sub_filter '{PREFIX}' '$scheme://';
        sub_filter '{domain}' '$http_host';
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
